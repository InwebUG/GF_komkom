<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teilnehmer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="Logo.png">
<link rel="stylesheet" href="assets/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="app">
<main class="main">

  <div class="section-head">
    <h2 class="section-title">Kennzahlen</h2>
    <button class="btn btn-sm btn-edit btn-edit-sec" onclick="kkOpenEditor('teilnehmer','kennzahlen')">✎ bearbeiten</button>
  </div>
  <div class="grid grid-4 mb-20" id="kpi-tn"></div>
  <div class="grid grid-4 mb-20" id="kpi-tn2"></div>

  <div class="grid grid-2 mb-20">
    <div class="card">
      <div class="card-header"><h2>Entwicklung Teilnehmerzahlen</h2>
        <button class="btn btn-sm btn-edit btn-edit-sec" onclick="kkOpenEditor('teilnehmer','entwicklung')">✎ bearbeiten</button>
      </div>
      <div class="chart-box"><canvas id="chart-entwicklung"></canvas></div>
    </div>
    <div class="card">
      <div class="card-header"><h2>Aktive TN nach Produkt</h2>
        <button class="btn btn-sm btn-edit btn-edit-sec" onclick="kkOpenEditor('teilnehmer','produkte')">✎ bearbeiten</button>
      </div>
      <div class="chart-box"><canvas id="chart-produkte"></canvas></div>
    </div>
  </div>

</main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/data.js"></script>
<script src="assets/js/app.js"></script>
<script>
kkShell({ title: 'Teilnehmer', subtitle: 'Ausbildungsstand · Starts · Abschlüsse · Kennzahlen' });
kkChartDefaults();
kkBoot('teilnehmer', function () {
const T = KK.teilnehmer;

document.getElementById('kpi-tn').innerHTML = `
  <div class="kpi">
    <div class="kpi-label">Aktuell in Ausbildung</div>
    <div class="kpi-value">${fmtNum(T.aktuellInAusbildung)}</div>
    <div class="kpi-sub">laufende Ausbildungen</div>
  </div>
  <div class="kpi kpi-yellow">
    <div class="kpi-label">Bald fertig (1 Modul)</div>
    <div class="kpi-value">${fmtNum(T.baldFertig)}</div>
    <div class="kpi-sub">Abschlüsse stehen an → Nachbesetzung planen</div>
  </div>
  <div class="kpi kpi-green">
    <div class="kpi-label">Beginn anstehend</div>
    <div class="kpi-value">${fmtNum(T.beginnAnstehend.reduce((s, g) => s + g.tn, 0))}</div>
    <div class="kpi-sub">in ${T.beginnAnstehend.length} Gruppen${T.beginnAnstehend.length ? ', nächster Start ' + T.beginnAnstehend[0].start : ''}</div>
  </div>
  <div class="kpi">
    <div class="kpi-label">Gesamtzahl TN</div>
    <div class="kpi-value">${fmtNum(T.gesamtAktiv + T.gesamtAbsolventen)}</div>
    <div class="kpi-sub">${fmtNum(T.gesamtAktiv)} aktiv · ${fmtNum(T.gesamtAbsolventen)} Absolventen</div>
  </div>`;

document.getElementById('kpi-tn2').innerHTML = `
  <div class="kpi">
    <div class="kpi-label">Anzahl Module (2026)</div>
    <div class="kpi-value">${fmtNum(T.anzahlModuleLaufend)}</div>
    <div class="kpi-sub">gebuchte Module im laufenden Jahr</div>
  </div>
  <div class="kpi">
    <div class="kpi-label">TN-Tage (YTD)</div>
    <div class="kpi-value">${fmtNum(T.tnTageYtd)}</div>
    <div class="kpi-sub">Teilnehmer × Trainingstage</div>
  </div>
  <div class="kpi">
    <div class="kpi-label">Jahresdurchschnitt TN</div>
    <div class="kpi-value">${fmtNum(T.jahresdurchschnittTn)}</div>
    <div class="kpi-sub">Ø aktive TN 2026</div>
  </div>
  <div class="kpi">
    <div class="kpi-label">Produkte</div>
    <div class="kpi-value">${T.tnProProdukt.length}</div>
    <div class="kpi-sub">KomPass Führung, Führung konkret, BZTZ, mFA …</div>
  </div>`;

new Chart(document.getElementById('chart-entwicklung'), {
  type: 'bar',
  data: {
    labels: T.entwicklungTn.labels,
    datasets: [
      { label: 'Aktiv (Ø Jahr)', data: T.entwicklungTn.aktiv, backgroundColor: KK_COLORS.orange, borderRadius: 6 },
      { label: 'Absolventen im Jahr', data: T.entwicklungTn.absolventen, backgroundColor: KK_COLORS.gray, borderRadius: 6 }
    ]
  },
  options: { maintainAspectRatio: false }
});

new Chart(document.getElementById('chart-produkte'), {
  type: 'doughnut',
  data: {
    labels: T.tnProProdukt.map(p => p.produkt),
    datasets: [{
      data: T.tnProProdukt.map(p => p.tn),
      backgroundColor: [KK_COLORS.orange, KK_COLORS.dark, KK_COLORS.orangeLight, KK_COLORS.green, KK_COLORS.gray],
      borderWidth: 2,
      borderColor: '#FFFFFF'
    }]
  },
  options: { maintainAspectRatio: false, cutout: '58%' }
});
});
</script>
</body>
</html>
