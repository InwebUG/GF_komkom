<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anmeldung · GF-Dashboard · Kompetenz Kompanie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="login-page">

  <div class="login-card">
    <img class="login-logo" src="Logo.png" alt="KompetenzKompanie">
    <h1>GF-Dashboard</h1>

    <form onsubmit="return kkLogin(event)">
      <div class="login-field">
        <label for="login-user">E-Mail</label>
        <input type="email" id="login-user" value="info@kompetenzkompanie.de" placeholder="info@kompetenzkompanie.de" autocomplete="username">
      </div>
      <div class="login-field">
        <label for="login-pass">Passwort</label>
        <div class="pw-wrap">
          <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
          <button type="button" class="pw-toggle" aria-label="Passwort anzeigen" onclick="kkTogglePassword(this)">Anzeigen</button>
        </div>
      </div>
      <div id="login-error" style="color:var(--kk-red);font-size:0.88rem;margin-bottom:8px;min-height:1em"></div>
      <button type="submit" class="btn btn-lg" style="width:100%;justify-content:center;margin-top:4px">Anmelden</button>
    </form>
  </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/data.js"></script>
<script src="assets/js/app.js"></script>
</body>
</html>
